<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>TIL — Jerry Vrabel</title>
    <script>
      // GitHub Pages SPA redirect trick
      // Converts the 404 path into a query string and redirects to index.html
      const path = window.location.pathname;
      const search = window.location.search;
      const hash = window.location.hash;
      const base = '/til';
      const redirectPath = path.slice(base.length) || '/';
      window.location.replace(
        base + '/?redirect=' + encodeURIComponent(redirectPath + search + hash)
      );
    </script>
  </head>
  <body></body>
</html>
