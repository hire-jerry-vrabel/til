<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="420" fill="url(#bg)" rx="12"/>
  <!-- Grid lines -->
  <g stroke="#ffffff08" stroke-width="1">
    <line x1="0" y1="70" x2="800" y2="70"/>
    <line x1="0" y1="140" x2="800" y2="140"/>
    <line x1="0" y1="210" x2="800" y2="210"/>
    <line x1="0" y1="280" x2="800" y2="280"/>
    <line x1="0" y1="350" x2="800" y2="350"/>
    <line x1="100" y1="0" x2="100" y2="420"/>
    <line x1="200" y1="0" x2="200" y2="420"/>
    <line x1="300" y1="0" x2="300" y2="420"/>
    <line x1="400" y1="0" x2="400" y2="420"/>
    <line x1="500" y1="0" x2="500" y2="420"/>
    <line x1="600" y1="0" x2="600" y2="420"/>
    <line x1="700" y1="0" x2="700" y2="420"/>
  </g>
  <!-- Flowchart nodes -->
  <rect x="320" y="40" width="160" height="44" rx="8" fill="#6366f1" opacity="0.9"/>
  <text x="400" y="67" text-anchor="middle" fill="white" font-family="monospace" font-size="13" font-weight="600">Write MDX Post</text>
  <!-- Arrow down -->
  <line x1="400" y1="84" x2="400" y2="114" stroke="#6366f1" stroke-width="2"/>
  <polygon points="400,120 394,110 406,110" fill="#6366f1"/>
  <!-- Decision diamond -->
  <polygon points="400,124 470,158 400,192 330,158" fill="#1e40af" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="400" y="163" text-anchor="middle" fill="white" font-family="monospace" font-size="11">Has Diagram?</text>
  <!-- Yes branch left -->
  <line x1="330" y1="158" x2="220" y2="158" stroke="#3b82f6" stroke-width="2"/>
  <polygon points="214,158 224,152 224,164" fill="#3b82f6"/>
  <text x="275" y="150" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="10">Yes</text>
  <rect x="120" y="136" width="160" height="44" rx="8" fill="#1e40af" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="200" y="163" text-anchor="middle" fill="white" font-family="monospace" font-size="12">Add Mermaid</text>
  <!-- No branch right -->
  <line x1="470" y1="158" x2="580" y2="158" stroke="#3b82f6" stroke-width="2"/>
  <polygon points="586,158 576,152 576,164" fill="#3b82f6"/>
  <text x="527" y="150" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="10">No</text>
  <rect x="520" y="136" width="160" height="44" rx="8" fill="#1e40af" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="600" y="163" text-anchor="middle" fill="white" font-family="monospace" font-size="12">Write Prose</text>
  <!-- Both converge down -->
  <line x1="200" y1="180" x2="200" y2="240" stroke="#3b82f6" stroke-width="2"/>
  <line x1="600" y1="180" x2="600" y2="240" stroke="#3b82f6" stroke-width="2"/>
  <line x1="200" y1="240" x2="600" y2="240" stroke="#3b82f6" stroke-width="2"/>
  <line x1="400" y1="240" x2="400" y2="258" stroke="#3b82f6" stroke-width="2"/>
  <polygon points="400,264 394,254 406,254" fill="#3b82f6"/>
  <!-- Render node -->
  <rect x="300" y="264" width="200" height="44" rx="8" fill="#0d9488" opacity="0.9"/>
  <text x="400" y="291" text-anchor="middle" fill="white" font-family="monospace" font-size="13" font-weight="600">Renders as SVG</text>
  <!-- Arrow down -->
  <line x1="400" y1="308" x2="400" y2="332" stroke="#0d9488" stroke-width="2"/>
  <polygon points="400,338 394,328 406,328" fill="#0d9488"/>
  <!-- Deploy node -->
  <rect x="290" y="338" width="220" height="44" rx="8" fill="#6366f1" opacity="0.9"/>
  <text x="400" y="365" text-anchor="middle" fill="white" font-family="monospace" font-size="13" font-weight="600">Push to GitHub Pages</text>
  <!-- Label -->
  <rect x="20" y="20" width="180" height="28" rx="6" fill="url(#accent)" opacity="0.15"/>
  <text x="30" y="39" fill="#a5b4fc" font-family="monospace" font-size="12" font-weight="700">Mermaid Diagrams</text>
</svg>
